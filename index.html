<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blade Runner 2049 | Flight Simulator</title>
    <meta name="description" content="A high-fidelity neon-noir flight simulator inspired by Blade Runner 2049.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      
      <!-- HUD -->
      <div id="hud" style="display: none;">
        <div id="zone-wrap">
          <div id="zone-name">LOS ANGELES · 2049</div>
          <div id="zone-sub">SECTOR 7 · AUTHORIZED FLIGHT ZONE</div>
        </div>

        <div id="boost-wrap">
          <div id="boost-label">▶ BOOST [F]</div>
          <div id="boost-track"><div id="boost-fill" style="width:100%"></div></div>
        </div>

        <div id="stats">
          <div class="srow">
            <span class="slabel">SPD</span>
            <span class="sval" id="spd">0</span>
            <div class="strack"><div class="sbar" id="spd-bar" style="width:0"></div></div>
          </div>
          <div class="srow">
            <span class="slabel">ALT</span>
            <span class="sval" id="alt">0m</span>
            <div class="strack"><div class="sbar alt" id="alt-bar" style="width:0"></div></div>
          </div>
        </div>

        <div id="radar-wrap">
          <div id="radar-label">◈ RADAR</div>
          <div id="radar-ring">
            <canvas id="minimap" width="120" height="120"></canvas>
            <div id="radar-sweep"></div>
          </div>
        </div>

        <div id="xhair"></div>
        <div id="hint">
          <span>W/S</span> THROTTLE &nbsp;<span>A/D</span> STRAFE &nbsp;<span>MOUSE</span> LOOK<br>
          <span>SPACE</span> CLIMB &nbsp;<span>SHIFT</span> DESCEND &nbsp;<span>F</span> BOOST &nbsp;<span>CLICK</span> LOCK MOUSE
        </div>
      </div>

      <!-- Overlays -->
      <div id="flash"></div>
      <div id="vignette"></div>
      <div id="scanlines"></div>

      <!-- Loading / Start Screen -->
      <div id="loading">
        <h1>BLADE RUNNER</h1>
        <h2>2 0 4 9</h2>
        <div id="loader-bar"></div>
        <div id="loading-status">INITIALIZING SPINNER SYSTEMS...</div>
        
        <div id="quality-wrap">
          <p>SELECT VISUAL FIDELITY</p>
          <div class="setting-buttons">
            <button class="qbtn" onclick="window.setQuality('low')">LOW</button>
            <button class="qbtn active" id="btn-high" onclick="window.setQuality('high')">HIGH</button>
          </div>
          <p id="auto-detect-msg" style="font-size: 0.7rem; margin-top: 10px; opacity: 0.6; color: #334;"></p>
        </div>

        <button id="start-btn" onclick="window.startGame()">◈ ENGAGE SPINNER</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
