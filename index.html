<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blade Runner 2049 | Flight Simulator</title>
    <meta name="description" content="A high-fidelity neon-noir flight simulator inspired by Blade Runner 2049.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      
      <div id="hud">
        <div class="hud-layer">
          <div id="zone-name">LOS ANGELES · 2049</div>
          <div id="speed">SPD: 0</div>
          <div id="altitude">ALT: 0m</div>
          <div class="minimap-wrapper">
            <canvas id="minimap" width="160" height="160"></canvas>
          </div>
          <div id="boost-container">
            <div class="label">BOOST</div>
            <div id="boost-bar"></div>
          </div>
        </div>
      </div>

      <div id="loading-screen">
        <div class="loader-content">
          <h1>BLADE RUNNER 2049</h1>
          <div class="loader-bar"></div>
          <p>INITIALIZING SPINNER SYSTEMS...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
